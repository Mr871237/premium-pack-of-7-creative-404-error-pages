<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Page not found</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: 'Inter', Arial, sans-serif; }
    .svg-animate:hover #magnifier {
      transform: scale(1.08) rotate(-8deg);
      filter: drop-shadow(0 4px 24px #3b82f6cc);
      transition: all 0.3s cubic-bezier(.4,2,.6,1);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-50 via-blue-50 to-indigo-100">
  <main class="w-full max-w-xl md:max-w-2xl mx-auto flex flex-col items-center justify-center px-4 py-8 md:py-16 rounded-2xl md:rounded-3xl shadow-2xl bg-white/80 backdrop-blur-md border border-blue-100">
    <!-- Illustration expressive -->
    <div class="w-full flex justify-center mb-8 md:mb-10 svg-animate cursor-pointer transition-transform">
      <svg class="w-40 h-28 md:w-[180px] md:h-[120px]" viewBox="0 0 180 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Dossier -->
        <rect x="40" y="50" width="100" height="50" rx="12" fill="#E0E7FF" stroke="#6366F1" stroke-width="2"/>
        <rect x="55" y="40" width="40" height="20" rx="6" fill="#C7D2FE" stroke="#6366F1" stroke-width="2"/>
        <!-- Loupe -->
        <g id="magnifier" style="transition:all 0.3s cubic-bezier(.4,2,.6,1);">
          <circle cx="120" cy="85" r="14" fill="#fff" stroke="#3b82f6" stroke-width="3"/>
          <rect x="132" y="97" width="18" height="5" rx="2.5" fill="#3b82f6" transform="rotate(45 132 97)"/>
        </g>
        <!-- Chaîne brisée -->
        <path d="M70 90 Q75 95 80 90" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
        <path d="M80 90 Q85 85 90 90" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>
    <!-- 404 Text -->
    <h1 class="text-6xl md:text-8xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-indigo-500 to-blue-400 mb-2 tracking-tight drop-shadow-lg">404</h1>
    <h2 class="text-xl md:text-3xl font-bold text-gray-700 mb-2 md:mb-3 text-center">Page not found</h2>
    <p class="text-gray-500 text-center mb-8 md:mb-10 text-base md:text-lg">Sorry, the page you are looking for doesn't exist or has been moved.<br class="hidden md:block">Let's get you back on track!</p>
    <div class="flex flex-col md:flex-row gap-4 md:gap-5 w-full justify-center">
      <a href="/" class="px-6 py-3 md:px-8 md:py-4 rounded-xl bg-blue-600 text-white font-bold shadow-xl hover:bg-blue-700 hover:scale-105 transition text-base md:text-lg focus:outline-none focus:ring-4 focus:ring-blue-200 text-center">Go Home</a>
      <a href="mailto:support@example.com" class="px-6 py-3 md:px-8 md:py-4 rounded-xl border-2 border-blue-600 text-blue-600 font-bold bg-white shadow-xl hover:bg-blue-50 hover:scale-105 transition text-base md:text-lg focus:outline-none focus:ring-4 focus:ring-blue-100 text-center">Contact Support</a>
    </div>
  </main>
</body>
</html>
