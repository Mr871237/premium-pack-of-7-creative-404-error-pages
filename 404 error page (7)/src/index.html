<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="decor-bg">
    <svg class="star star1" width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="2" fill="#fff" opacity="0.7"/></svg>
    <svg class="star star2" width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="1.5" fill="#00eaff" opacity="0.6"/></svg>
    <svg class="planet" width="60" height="60" viewBox="0 0 60 60"><ellipse cx="30" cy="34" rx="18" ry="10" fill="#7f5af0" opacity="0.18"/><circle cx="30" cy="30" r="16" fill="#7f5af0" opacity="0.25"/></svg>
    <svg class="line-abstract" width="120" height="40" viewBox="0 0 120 40"><path d="M0 20 Q40 0 80 20 T120 20" stroke="#00eaff" stroke-width="2" fill="none" opacity="0.12"/></svg>
  </div>
  <div class="container">
    <div class="animation" id="animation">
      <svg id="astronaut" width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="28" stroke="#fff" stroke-width="3" opacity="0.15"/>
        <ellipse cx="30" cy="38" rx="12" ry="6" fill="#fff" opacity="0.08"/>
        <circle cx="30" cy="28" r="12" fill="#fff"/>
        <circle cx="30" cy="28" r="8" fill="#232526"/>
        <rect x="26" y="40" width="8" height="10" rx="4" fill="#fff"/>
        <rect x="28" y="44" width="4" height="8" rx="2" fill="#232526"/>
      </svg>
    </div>
    <h1><span class="glow"><span class="scan">404</span></span></h1>
    <h2><span class="fade-in">Page Not Found</span></h2>
    <p>The page you are looking for doesn't exist or has been moved.</p>
    <div class="secondary-message"><span class="secondary-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="9" stroke="#7f5af0" stroke-width="2"/><rect x="9" y="8" width="2" height="6" rx="1" fill="#7f5af0"/><rect x="9" y="5" width="2" height="2" rx="1" fill="#7f5af0"/></svg></span> Maybe you mistyped the address or the page has been moved.</div>
    <a href="/" class="home-btn"><span class="btn-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 9.5L10 4L17 9.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="6.5" y="11" width="7" height="5.5" rx="1.5" stroke="#fff" stroke-width="2"/></svg></span> Go to Homepage</a>
  </div>
  <script src="script.js"></script>
</body>
</html>
